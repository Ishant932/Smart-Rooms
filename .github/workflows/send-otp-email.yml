name: Send OTP Email

on:
  repository_dispatch:
    types: [smartroooms_send_email]

run-name: Mail to ${{ github.event.client_payload.to }}

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Authorize relay
        env:
          EXPECTED: ${{ secrets.MAIL_RELAY_SECRET }}
          GOT: ${{ github.event.client_payload.secret }}
        run: |
          if [ -z "$EXPECTED" ] || [ "$EXPECTED" != "$GOT" ]; then
            echo "Unauthorized mail relay request"
            exit 1
          fi

      - name: Send via Gmail SMTP
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ github.event.client_payload.to }}
          MAIL_SUBJECT: ${{ github.event.client_payload.subject }}
          MAIL_TEXT: ${{ github.event.client_payload.text }}
          MAIL_HTML: ${{ github.event.client_payload.html }}
        run: |
          python3 <<'PY'
          import os, smtplib, ssl
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          user = os.environ["GMAIL_USER"]
          # Gmail app passwords may be stored with spaces
          password = os.environ["GMAIL_APP_PASSWORD"].replace(" ", "")
          to = os.environ["MAIL_TO"]
          subject = os.environ["MAIL_SUBJECT"]
          text = os.environ.get("MAIL_TEXT") or ""
          html = os.environ.get("MAIL_HTML") or ""

          if not all([user, password, to, subject]):
              raise SystemExit("Missing mail fields")

          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"] = f"SmartRoooms <{user}>"
          msg["To"] = to
          msg.attach(MIMEText(text, "plain", "utf-8"))
          if html:
              msg.attach(MIMEText(html, "html", "utf-8"))

          context = ssl.create_default_context()
          with smtplib.SMTP_SSL("smtp.gmail.com", 465, context=context, timeout=30) as server:
              server.login(user, password)
              server.sendmail(user, [to], msg.as_string())
          print("sent ok")
          PY
