<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartRoooms Jaipur</title>
  <meta http-equiv="refresh" content="2;url=http://localhost:5173">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; padding: 24px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
      color: white; text-align: center;
    }
    .card {
      max-width: 420px; padding: 40px 32px; border-radius: 24px;
      background: rgba(255,255,255,0.12); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 24px 48px rgba(0,0,0,0.2);
    }
    h1 { margin: 0 0 8px; font-size: 1.75rem; }
    p { margin: 0 0 16px; opacity: 0.9; line-height: 1.5; }
    a.btn {
      display: inline-block; margin: 8px 4px; padding: 12px 24px;
      border-radius: 999px; background: white; color: #4f46e5;
      font-weight: 700; text-decoration: none; font-size: 0.95rem;
    }
    a.btn:hover { transform: scale(1.03); }
    .hint { font-size: 0.8rem; opacity: 0.75; margin-top: 24px; }
    code { background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 6px; }
    .spinner {
      width: 36px; height: 36px; margin: 16px auto;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>SmartRoooms</h1>
    <p>Jaipur student room rentals — zero brokerage</p>
    <div class="spinner" aria-hidden="true"></div>
    <p>Opening website in browser…</p>
    <a class="btn" href="http://localhost:5173">Open Website</a>
    <a class="btn" href="http://localhost:5000" style="background:rgba(255,255,255,0.2);color:white">Production (port 5000)</a>
    <p class="hint">
      First time? Double-click <code>START WEBSITE.bat</code> in this folder.<br>
      Do not close that window while browsing.
    </p>
  </div>
  <script>
    setTimeout(function () {
      window.location.href = 'http://localhost:5173';
    }, 1500);
  </script>
</body>
</html>
